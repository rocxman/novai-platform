apiVersion: v1
kind: Secret
metadata:
  name: novai-secrets
  namespace: novai-production
type: Opaque
stringData:
  DATABASE_URL: postgresql://novai_user:PASSWORD@DATABASE_IP:5432/novai_main
  REDIS_URL: redis://REDIS_HOST:6379
  JWT_SECRET: CHANGE_ME_SUPER_SECRET_JWT_KEY_MIN_32_CHARS
  GOOGLE_AI_API_KEY: CHANGE_ME_GOOGLE_AI_API_KEY
  VERTEX_AI_PROJECT_ID: CHANGE_ME_PROJECT_ID
  VERTEX_AI_LOCATION: us-central1
  GCS_BUCKET_NAME: CHANGE_ME_BUCKET_NAME
  GOOGLE_CLIENT_ID: CHANGE_ME_GOOGLE_CLIENT_ID
  GOOGLE_CLIENT_SECRET: CHANGE_ME_GOOGLE_CLIENT_SECRET
  MIDTRANS_SERVER_KEY: CHANGE_ME_MIDTRANS_SERVER_KEY
  MIDTRANS_CLIENT_KEY: CHANGE_ME_MIDTRANS_CLIENT_KEY
  SENDGRID_API_KEY: CHANGE_ME_SENDGRID_API_KEY
  SENTRY_DSN: CHANGE_ME_SENTRY_DSN
